spring:
  application:
    name: ai
  datasource:
    # LOCK_TIMEOUT: contended reserves wait for the row write-lock (10s) instead
    # of failing fast — keeps the atomic-reserve guard race-safe under load.
    url: jdbc:h2:mem:wms;DB_CLOSE_DELAY=-1;LOCK_TIMEOUT=10000
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  # H2 web console at /h2-console (dev debugging only)
  h2:
    console:
      enabled: true
