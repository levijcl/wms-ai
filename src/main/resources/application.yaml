spring:
  application:
    name: ai
  datasource:
    # LOCK_TIMEOUT: contended reserves wait for the row write-lock (10s) instead
    # of failing fast — keeps the atomic-reserve guard race-safe under load.
    url: jdbc:h2:mem:wms;DB_CLOSE_DELAY=-1;LOCK_TIMEOUT=10000
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  # H2 web console at /h2-console (dev debugging only)
  h2:
    console:
      enabled: true
  # Phase B AI dispatcher (README §3.7). The key is read from the ANTHROPIC_API_KEY env var;
  # the empty default lets the app boot and tests run without one (only POST /api/dispatch/ai
  # needs it). Model defaults to the cheapest (Haiku); temperature 0 for reproducible decisions.
  ai:
    anthropic:
      api-key: ${ANTHROPIC_API_KEY:}
      chat:
        options:
          model: claude-haiku-4-5
          temperature: 0.0
